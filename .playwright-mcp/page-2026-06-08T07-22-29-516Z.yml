        - heading "⚡ Agent 轻量解析 API" [level=1] [ref=e937]
        - blockquote [ref=e938]:
          - paragraph [ref=e939]: 免登录，无需 Token，IP 限频防滥用。专为 OpenClaw 等 AI Agent 场景设计，仅输出 Markdown，免登录零门槛。
        - heading "概述" [level=2] [ref=e940]
        - paragraph [ref=e941]: Agent 轻量解析接口专为 OpenClaw 等 AI Agent 场景设计，提供快速、免登录的文档解析能力。
        - paragraph [ref=e942]:
          - strong [ref=e943]: 核心特性：
        - list [ref=e944]:
          - listitem [ref=e945]:
            - strong [ref=e946]: 无需登录
            - text: ：通过 IP 限频防滥用，无需 Token
          - listitem [ref=e947]:
            - strong [ref=e948]: 轻量快速
            - text: ：PDF、图片使用 pipeline 轻量模型，禁用表格/公式识别，追求最快解析速度; Word、PPT使用Office原生API解析
          - listitem [ref=e949]:
            - strong [ref=e950]: 统一输出
            - text: ：仅输出 Markdown 格式，返回 CDN 链接
          - listitem [ref=e951]:
            - strong [ref=e952]: 双模式提交
            - text: ：URL 解析和文件上传为独立接口，文件上传采用签名上传模式
        - paragraph [ref=e953]:
          - strong [ref=e954]: 文件限制：
        - table [ref=e956]:
          - rowgroup [ref=e957]:
