        - heading "2.批量文件解析" [level=2] [ref=e402]
        - heading "本地文件批量上传解析" [level=3] [ref=e403]
        - paragraph [ref=e404]:
          - strong [ref=e405]: 接口说明
        - paragraph [ref=e406]: 适用于本地文件上传解析的场景，可通过此接口批量申请文件上传链接，上传文件后，系统会自动提交解析任务 注意：
        - list [ref=e407]:
          - listitem [ref=e408]: 申请的文件上传链接有效期为 24 小时，请在有效期内完成文件上传
          - listitem [ref=e409]: 上传文件时，无须设置 Content-Type 请求头
          - listitem [ref=e410]: 文件上传完成后，无须调用提交解析任务接口。系统会自动扫描已上传完成文件自动提交解析任务
          - listitem [ref=e411]: 单次申请链接不能超过 50 个
          - listitem [ref=e412]: header头中需要包含 Authorization 字段，格式为 Bearer + 空格 + Token
        - paragraph [ref=e413]:
          - strong [ref=e414]: Python 请求示例（适用于pdf、doc、ppt、excel、图片文件）：
        - code [ref=e417]:
          - text: "import requests token = \"API管理页面自定创建的token\" url = \"https://mineru.net/api/v4/file-urls/batch\" header = { \"Content-Type\": \"application/json\", \"Authorization\": f\"Bearer {token}\""
          - text: "} data = { \"files\": [ {\"name\":\"demo.pdf\", \"data_id\": \"abcd\"} ], \"model_version\":\"vlm\""
          - text: "} file_path = [\"demo.pdf\"]"
          - text: "try: response = requests.post(url,headers=header,json=data) if response.status_code == 200: result = response.json() print('response success. result:{}'.format(result)) if result[\"code\"] == 0: batch_id = result[\"data\"][\"batch_id\"] urls = result[\"data\"][\"file_urls\"] print('batch_id:{},urls:{}'.format(batch_id, urls)) for i in range(0, len(urls)): with open(file_path[i], 'rb') as f: res_upload = requests.put(urls[i], data=f) if res_upload.status_code == 200: print(f\"{urls[i]} upload success\") else: print(f\"{urls[i]} upload failed\") else: print('apply upload url failed,reason:{}'.format(result[\"msg\"])) else: print('response not success. status:{} ,result:{}'.format(response.status_code, response))"
          - text: "except Exception as err: print(err)"
        - paragraph [ref=e418]:
          - strong [ref=e419]: Python 请求示例（适用于html文件）：
        - code [ref=e422]:
          - text: "import requests token = \"API管理页面自定创建的token\" url = \"https://mineru.net/api/v4/file-urls/batch\" header = { \"Content-Type\": \"application/json\", \"Authorization\": f\"Bearer {token}\""
          - text: "} data = { \"files\": [ {\"name\":\"demo.html\", \"data_id\": \"abcd\"} ], \"model_version\":\"MinerU-HTML\""
          - text: "} file_path = [\"demo.html\"]"
          - text: "try: response = requests.post(url,headers=header,json=data) if response.status_code == 200: result = response.json() print('response success. result:{}'.format(result)) if result[\"code\"] == 0: batch_id = result[\"data\"][\"batch_id\"] urls = result[\"data\"][\"file_urls\"] print('batch_id:{},urls:{}'.format(batch_id, urls)) for i in range(0, len(urls)): with open(file_path[i], 'rb') as f: res_upload = requests.put(urls[i], data=f) if res_upload.status_code == 200: print(f\"{urls[i]} upload success\") else: print(f\"{urls[i]} upload failed\") else: print('apply upload url failed,reason:{}'.format(result[\"msg\"])) else: print('response not success. status:{} ,result:{}'.format(response.status_code, response))"
          - text: "except Exception as err: print(err)"
