        - heading "🎯 精准解析 API" [level=1] [ref=e115]
        - blockquote [ref=e116]:
          - paragraph [ref=e117]: 需填写token（API管理页面自定创建），支持 pipeline / vlm / MinerU-HTML 三种模型，单文件和批量均支持。
        - heading "概述" [level=2] [ref=e118]
        - paragraph [ref=e119]: MinerU 的精准解析 API 专为需要高精度、深层次结构化提取的复杂文档设计。它能够智能识别并处理各类复杂版式、多模态内容（如表格、数学公式、图表、图片、多栏布局等），将文档内容转化为高质量的结构化数据。
        - paragraph [ref=e120]:
          - strong [ref=e121]: 核心特性：
        - list [ref=e122]:
          - listitem [ref=e123]:
            - strong [ref=e124]: 极致精度
            - text: ：提供行业领先的解析准确性，尤其擅长处理非标准和复杂文档
          - listitem [ref=e125]:
            - strong [ref=e126]: 深度结构化
            - text: ：不仅仅是文本提取，更能深度理解文档的版面和语义，输出包含丰富层级关系的结构化数据
          - listitem [ref=e127]:
            - strong [ref=e128]: 多模态支持
            - text: ：全面支持文本、表格、图片、公式等多种内容类型的精准识别与提取
          - listitem [ref=e129]:
            - strong [ref=e130]: 复杂版式适应
            - text: ：有效应对扫描件、排版混乱、水印干扰等复杂文档场景
        - paragraph [ref=e131]:
          - strong [ref=e132]: 文件限制：
