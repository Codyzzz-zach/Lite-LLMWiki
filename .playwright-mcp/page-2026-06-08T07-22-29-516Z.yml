        - heading "创建解析任务" [level=3] [ref=e151]
        - paragraph [ref=e152]:
          - strong [ref=e153]: 接口说明
        - paragraph [ref=e154]: 适用于通过 API 创建解析任务的场景，用户需在 Header 中填写 Token（可在 API 管理页面自定创建）。 注意：
        - list [ref=e155]:
          - listitem [ref=e156]: 单个文件大小不能超过 200MB,文件页数不超出 200 页
          - listitem [ref=e157]: 每个账号每天享有 1000 页最高优先级解析额度，超过 1000 页的部分优先级降低
          - listitem [ref=e158]: 因网络限制，github、aws 等国外 URL 会请求超时
          - listitem [ref=e159]: 该接口不支持文件直接上传
          - listitem [ref=e160]: header头中需要包含 Authorization 字段，格式为 Bearer + 空格 + Token
        - paragraph [ref=e161]:
          - strong [ref=e162]: Python 请求示例（适用于pdf、doc、ppt、excel、图片文件）：
        - code [ref=e165]:
          - text: "import requests token = \"API管理页面自定创建的token\" url = \"https://mineru.net/api/v4/extract/task\" header = { \"Content-Type\": \"application/json\", \"Authorization\": f\"Bearer {token}\""
          - text: "} data = { \"url\": \"https://cdn-mineru.openxlab.org.cn/demo/example.pdf\", \"model_version\": \"vlm\""
          - text: "} res = requests.post(url,headers=header,json=data)"
          - text: print(res.status_code)
          - text: print(res.json())
          - text: print(res.json()["data"])
        - paragraph [ref=e166]:
          - strong [ref=e167]: Python 请求示例（适用于html文件）：
        - code [ref=e170]:
          - text: "import requests token = \"API管理页面自定创建的token\" url = \"https://mineru.net/api/v4/extract/task\" header = { \"Content-Type\": \"application/json\", \"Authorization\": f\"Bearer {token}\""
          - text: "} data = { \"url\": \"https://****\", \"model_version\": \"MinerU-HTML\""
          - text: "} res = requests.post(url,headers=header,json=data)"
          - text: print(res.status_code)
          - text: print(res.json())
          - text: print(res.json()["data"])
        - paragraph [ref=e171]:
          - strong [ref=e172]: CURL 请求示例（适用于pdf、doc、ppt、excel、图片文件）：
        - code [ref=e175]: "curl --location --request POST 'https://mineru.net/api/v4/extract/task' \\ --header 'Authorization: Bearer ***' \\ --header 'Content-Type: application/json' \\ --header 'Accept: */*' \\ --data-raw '{ \"url\": \"https://cdn-mineru.openxlab.org.cn/demo/example.pdf\", \"model_version\": \"vlm\" }'"
