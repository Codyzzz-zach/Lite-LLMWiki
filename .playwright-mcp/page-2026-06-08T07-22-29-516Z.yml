        - heading "url 批量上传解析" [level=3] [ref=e562]
        - paragraph [ref=e563]:
          - strong [ref=e564]: 接口说明
        - paragraph [ref=e565]: 适用于通过 API 批量创建提取任务的场景 注意：
        - list [ref=e566]:
          - listitem [ref=e567]: 单次申请链接不能超过 50 个
          - listitem [ref=e568]: 文件大小不能超过 200MB,文件页数不超出 200 页
          - listitem [ref=e569]: 因网络限制，github、aws 等国外 URL 会请求超时
          - listitem [ref=e570]: header头中需要包含 Authorization 字段，格式为 Bearer + 空格 + Token
        - paragraph [ref=e571]:
          - strong [ref=e572]: Python 请求示例（适用于pdf、doc、ppt、excel、图片文件）：
        - code [ref=e575]:
          - text: "import requests token = \"API管理页面自定创建的token\" url = \"https://mineru.net/api/v4/extract/task/batch\" header = { \"Content-Type\": \"application/json\", \"Authorization\": f\"Bearer {token}\""
          - text: "} data = { \"files\": [ {\"url\":\"https://cdn-mineru.openxlab.org.cn/demo/example.pdf\", \"data_id\": \"abcd\"} ], \"model_version\": \"vlm\""
          - text: "}"
          - text: "try: response = requests.post(url,headers=header,json=data) if response.status_code == 200: result = response.json() print('response success. result:{}'.format(result)) if result[\"code\"] == 0: batch_id = result[\"data\"][\"batch_id\"] print('batch_id:{}'.format(batch_id)) else: print('submit task failed,reason:{}'.format(result[\"msg\"])) else: print('response not success. status:{} ,result:{}'.format(response.status_code, response))"
          - text: "except Exception as err: print(err)"
        - paragraph [ref=e576]:
          - strong [ref=e577]: Python 请求示例（适用于html文件）：
        - code [ref=e580]:
          - text: "import requests token = \"API管理页面自定创建的token\" url = \"https://mineru.net/api/v4/extract/task/batch\" header = { \"Content-Type\": \"application/json\", \"Authorization\": f\"Bearer {token}\""
          - text: "} data = { \"files\": [ {\"url\":\"https://***\", \"data_id\": \"abcd\"} ], \"model_version\": \"MinerU-HTML\""
          - text: "}"
          - text: "try: response = requests.post(url,headers=header,json=data) if response.status_code == 200: result = response.json() print('response success. result:{}'.format(result)) if result[\"code\"] == 0: batch_id = result[\"data\"][\"batch_id\"] print('batch_id:{}'.format(batch_id)) else: print('submit task failed,reason:{}'.format(result[\"msg\"])) else: print('response not success. status:{} ,result:{}'.format(response.status_code, response))"
          - text: "except Exception as err: print(err)"
